name: ios-trollstore

# Build an unsigned IPA for TrollStore side-loading. No App Store Connect, no signing
# certificates — just compile and package. The IPA lands as a workflow artifact.

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "版本号（留空则用仓库里的 CFBundleShortVersionString）"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  trollstore:
    # TrollStore supports iOS 17.0, and many target devices intentionally stay there. Pin the last
    # iOS-17-era Xcode so SwiftUI/WidgetKit cannot acquire an iOS 18+ runtime symbol through a newer SDK
    # (dyld otherwise terminates the extension before its provider/view runs, leaving a pure black tile).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 15.4 (iOS 17 compatible)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install XcodeGen
        run: |
          # GitHub's macOS image may carry an unrelated untrusted aws/tap. It is not
          # needed here; remove it instead of weakening Homebrew's tap trust checks.
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Unpin dev-box JDK from gradle.properties
        run: sed -i '' '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Restore GoogleService-Info.plist
        # If you set the GOOGLE_SERVICE_INFO_PLIST secret (base64-encoded or raw XML
        # of your Firebase project's GoogleService-Info.plist), push + analytics +
        # Crashlytics work normally. Without it, the build uses the repo's placeholder
        # template — the app still works but Firebase features are inert.
        #
        # Setup: Firebase Console → add iOS app (bundle: com.panda.ccpocket) → download
        # plist → base64 -i GoogleService-Info.plist | pbcopy → paste into repo secret.
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            if printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > iosApp/iosApp/GoogleService-Info.plist 2>/dev/null && plutil -lint iosApp/iosApp/GoogleService-Info.plist >/dev/null 2>&1; then
              echo "GoogleService-Info.plist: decoded from base64 secret"
            else
              printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > iosApp/iosApp/GoogleService-Info.plist
              echo "GoogleService-Info.plist: written from raw secret value"
            fi
          else
            cp iosApp/iosApp/GoogleService-Info.plist.template \
               iosApp/iosApp/GoogleService-Info.plist
            echo "GoogleService-Info.plist: using placeholder template (no Firebase features)"
          fi

      - name: Generate Xcode project from project.yml
        run: |
          cd iosApp
          xcodegen generate
          # Current XcodeGen writes objectVersion 77 even when the spec declares xcodeVersion 15.4.
          # This project uses no format-77-only objects, so lower the compatibility marker explicitly.
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/' iosApp.xcodeproj/project.pbxproj
          grep -q 'objectVersion = 56;' iosApp.xcodeproj/project.pbxproj

      - name: Stamp version & build number
        id: stamp
        env:
          MARKETING_VERSION: ${{ inputs.marketing_version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PLIST=iosApp/iosApp/Info.plist
          WIDGET_PLIST=iosApp/CCPocketUsageWidget/Info.plist
          REPO_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          VERSION="${MARKETING_VERSION:-$REPO_VERSION}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$WIDGET_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$WIDGET_PLIST"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "building $VERSION ($BUILD_NUMBER)"

      - name: Archive (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/CCPocket.xcarchive" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive | tee "$RUNNER_TEMP/archive.log"
          grep -q "ARCHIVE SUCCEEDED" "$RUNNER_TEMP/archive.log"

      - name: Package unsigned IPA from archive (no exportArchive)
        id: package
        env:
          VERSION: ${{ steps.stamp.outputs.version }}
          BUILD: ${{ github.run_number }}
        run: |
          # Skip xcodebuild -exportArchive entirely — it requires a Team ID even for
          # ad-hoc manual signing. Instead, pull the unsigned .app straight out of the
          # .xcarchive and hand-pack it into a classic Payload IPA.
          ARCHIVE="$RUNNER_TEMP/CCPocket.xcarchive"
          APP="$ARCHIVE/Products/Applications/cc-pocket.app"

          if [ ! -d "$APP" ]; then
            echo "::error::No .app in archive at $APP"
            ls -laR "$ARCHIVE/Products/"
            exit 1
          fi

          # Strip any leftover code signatures so TrollStore can inject its own.
          find "$APP" -type d -name "_CodeSignature" -exec rm -rf {} + 2>/dev/null || true
          rm -f "$APP/embedded.mobileprovision" 2>/dev/null || true

          # An unsigned Xcode archive does not embed the targets' entitlements. Use Apple's codesign to
          # create ad-hoc signatures (nested extension first) with both XML and DER entitlement slots.
          # ldid-only signing left WidgetKit extensions launchable-looking but black on current iOS because
          # the extension signature lacked the modern DER entitlement representation and full identifiers.
          WIDGET="$APP/PlugIns/CCPocketUsageWidget.appex"
          if [ ! -x "$WIDGET/CCPocketUsageWidget" ]; then
            echo "::error::Widget extension executable missing at $WIDGET"
            find "$APP" -maxdepth 4 -print
            exit 1
          fi
          APP_ENTITLEMENTS="$RUNNER_TEMP/app-trollstore.entitlements"
          WIDGET_ENTITLEMENTS="$RUNNER_TEMP/widget-trollstore.entitlements"
          cp "$GITHUB_WORKSPACE/iosApp/iosApp/iosApp.entitlements" "$APP_ENTITLEMENTS"
          cp "$GITHUB_WORKSPACE/iosApp/CCPocketUsageWidget/CCPocketUsageWidget.entitlements" "$WIDGET_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :application-identifier string TROLLSTORE.com.panda.ccpocket" "$APP_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string TROLLSTORE" "$APP_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :application-identifier string TROLLSTORE.com.panda.ccpocket.usage-widget" "$WIDGET_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string TROLLSTORE" "$WIDGET_ENTITLEMENTS"

          codesign --force --sign - --timestamp=none --generate-entitlement-der \
            --entitlements "$WIDGET_ENTITLEMENTS" "$WIDGET"
          codesign --force --sign - --timestamp=none --generate-entitlement-der \
            --entitlements "$APP_ENTITLEMENTS" "$APP"

          # Fail the build instead of publishing another visually present but unusable widget.
          codesign -d --entitlements :- "$WIDGET" > "$RUNNER_TEMP/widget-entitlements.plist" 2>&1
          codesign -d --entitlements :- "$APP" > "$RUNNER_TEMP/app-entitlements.plist" 2>&1
          grep -q "group.com.panda.ccpocket" "$RUNNER_TEMP/widget-entitlements.plist"
          grep -q "group.com.panda.ccpocket" "$RUNNER_TEMP/app-entitlements.plist"
          codesign --verify --strict "$WIDGET"
          codesign --verify --strict "$APP"

          # Classic unsigned IPA: Payload/<AppName>.app + zip
          IPA_OUT="cc-pocket-${VERSION}-build${BUILD}-trollstore.ipa"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "$IPA_OUT" Payload
          rm -rf Payload

          echo "ipa_path=$IPA_OUT" >> "$GITHUB_OUTPUT"
          echo "IPA: $IPA_OUT ($(du -h "$IPA_OUT" | cut -f1))"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: cc-pocket-${{ steps.stamp.outputs.version }}-build${{ github.run_number }}-trollstore
          path: ${{ steps.package.outputs.ipa_path }}
          retention-days: 90
