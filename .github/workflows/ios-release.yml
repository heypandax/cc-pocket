name: ios-release

# Archives the iOS app (com.panda.ccpocket), embeds the Kotlin/Native ComposeApp framework, and uploads
# the build to App Store Connect — fully unattended. The local flow in docs/RELEASE.md relies on an
# interactive Xcode-account session; CI instead authenticates with an App Store Connect API key (.p8 +
# Key ID + Issuer ID) for BOTH cloud-managed signing (-allowProvisioningUpdates creates the distribution
# cert/profile on the fly) and the upload. iOS ships on its own version line (CFBundleShortVersionString),
# independent of the daemon's release.yml — hence a separate workflow.
#
# Required repo secrets (one-time setup):
#   APPSTORE_API_KEY_P8        base64 of the App Store Connect API key .p8
#                              (App Store Connect -> Users and Access -> Integrations -> App Store Connect
#                               API -> generate a key with role >= App Manager; download the .p8 ONCE)
#   APPSTORE_API_KEY_ID        the key's Key ID
#   APPSTORE_API_ISSUER_ID     the team's Issuer ID (same Integrations page)
#   GOOGLE_SERVICE_INFO_PLIST  base64 of iosApp/iosApp/GoogleService-Info.plist (gitignored Firebase config)
# (The repo's APNs AuthKey_*.p8 is for push, NOT App Store Connect — do not reuse it here.)

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version override. LEAVE EMPTY to use the repo's lockstepped version (Info.plist CFBundleShortVersionString) — a stale hardcoded default shipped 1.0.1 twice and ASC rejected the upload after a 20-minute archive. Only set this to attach another build to a DIFFERENT already-open version."
        required: false
        default: ""
      submit_for_review:
        description: "After the build finishes ASC processing: attach it to the version and submit for review (release notes + review notes ride along)."
        type: boolean
        default: true
      automatic_release:
        description: "Release automatically once App Review approves (false = you press Release in ASC)."
        type: boolean
        default: true
      distribute_testflight:
        description: "After the build is processed, also put it behind the TestFlight public link (external Beta App Review) — folds in what used to be a separate testflight-public-link.yml dispatch."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-26  # Xcode 26 / macOS 26 SDK — matches the local toolchain that produced prior uploads
    outputs:
      version: ${{ steps.stamp.outputs.version }} # resolved marketing version (repo lockstep unless overridden)
    steps:
      - uses: actions/checkout@v6

      - name: Validate store metadata (fail fast, before the 20-minute archive)
        # ASC rejects certain characters in What's New with "attribute value has invalid characters" —
        # but only at the deliver step, AFTER build+upload. ✕ actually burned a run (1.3.0); extend the
        # blocklist when ASC teaches us a new one.
        run: |
          BAD='✕'
          if grep -rn "[$BAD]" fastlane/metadata/*/release_notes.txt; then
            echo "::error::release_notes.txt contains characters App Store Connect rejects ($BAD) — fix fastlane/metadata before dispatching."
            exit 1
          fi

      - name: Set up JDK 17
        # Exports JAVA_HOME for later steps; the Xcode "Compile Kotlin Framework" build phase reads
        # ${JAVA_HOME:-...} to find java, and (with the pin removed below) gradle uses it too.
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Unpin the dev-box JDK from gradle.properties
        # gradle.properties pins org.gradle.java.home to the Mac dev box's Homebrew JDK, which doesn't
        # exist on the runner AND overrides JAVA_HOME. Drop the line so the gradle invoked by Xcode's
        # build phase falls back to the runner's JAVA_HOME (same intent as the android job's -D override).
        run: sed -i '' '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Restore GoogleService-Info.plist
        # Gitignored (Firebase config, like Android's google-services.json). Must exist BEFORE xcodegen
        # so it's globbed into the project as a bundled resource — else Firebase has no config at runtime.
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret is not set."; exit 1
          fi
          OUT=iosApp/iosApp/GoogleService-Info.plist
          # Accept the secret as EITHER base64 OR the raw plist XML (it's plain text, not binary), so a
          # pasted-raw secret doesn't fail base64 decode. plutil -lint is the hard gate on the result.
          if printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > "$OUT" 2>/dev/null && plutil -lint "$OUT" >/dev/null 2>&1; then
            echo "GoogleService-Info.plist: decoded from base64"
          else
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > "$OUT"
            echo "GoogleService-Info.plist: written from raw secret value"
          fi
          plutil -lint "$OUT"

      - name: Generate Xcode project (+ shared scheme) from project.yml
        # The committed .xcodeproj has NO shared scheme, so `-scheme iosApp` fails on a fresh checkout.
        # project.yml is the source of truth; xcodegen regenerates the project with a shared scheme.
        run: cd iosApp && xcodegen generate

      - name: Stamp version & build number
        id: stamp
        # Marketing version: the REPO is the source of truth — Info.plist is version-lockstepped with
        # gradle by the release commit, so an empty input means "ship what the repo says". The input
        # only OVERRIDES for the attach-to-another-version case. This replaced a hardcoded "1.0.1"
        # default that ASC rejected twice (train closed) — each time only after a 20-minute archive.
        # Build number = the workflow run number: strictly increasing across runs, so every upload is
        # unique automatically (App Store Connect rejects a re-used build number under one marketing version).
        env:
          MARKETING_VERSION: ${{ inputs.marketing_version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PLIST=iosApp/iosApp/Info.plist
          REPO_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          VERSION="${MARKETING_VERSION:-$REPO_VERSION}"
          if [ -n "$MARKETING_VERSION" ] && [ "$MARKETING_VERSION" != "$REPO_VERSION" ]; then
            echo "::warning::overriding repo version $REPO_VERSION with input $MARKETING_VERSION — make sure that ASC version train is still open."
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "building $VERSION ($BUILD_NUMBER)"

      - name: Stage App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          if [ -z "$ASC_KEY_P8" ] || [ -z "$ASC_KEY_ID" ]; then
            echo "::error::APPSTORE_API_KEY_P8 / APPSTORE_API_KEY_ID secrets are not set."; exit 1
          fi
          # both locations: -authenticationKeyPath reads the explicit path; some tooling also looks in ~/.appstoreconnect
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_P8" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive (Release, cloud-managed signing)
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -o pipefail   # tee must not mask xcodebuild's exit code (the classic "tail ate the failure")
          # Dev-signed archive on purpose; the export step re-signs everything (nested frameworks
          # included) with the cloud-managed distribution cert. Each ephemeral runner mints a fresh
          # development cert here, so the account fills up after a handful of releases ("Choose a
          # certificate to revoke", 1.2.2) — run asc-maintenance.yml to purge them when that hits.
          # The two dead ends (1.2.2): a global CODE_SIGN_IDENTITY=Apple Distribution override trips
          # the app target's automatic-vs-manual conflict and makes every SPM package demand a team;
          # CODE_SIGNING_ALLOWED=NO uploads with UNSIGNED Firebase frameworks — exportArchive only
          # re-signs what the archive signed, and ASC rejects the binary ("Invalid Signature").
          xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/CCPocket.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            archive | tee "$RUNNER_TEMP/archive.log"
          grep -q "ARCHIVE SUCCEEDED" "$RUNNER_TEMP/archive.log"

      - name: Export & upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/CCPocket.xcarchive" \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" | tee "$RUNNER_TEMP/export.log"
          # destination=upload means success is the upload, not an IPA on disk; gate on the marker
          grep -q "EXPORT SUCCEEDED" "$RUNNER_TEMP/export.log"

  # The App-Store half runs on a CHEAP ubuntu runner: fastlane deliver is pure ASC-API work (no Xcode),
  # and waiting out build processing (5-30min, sometimes more) on the 10x-billed macOS runner would be
  # money down the drain. Polls the uploaded build until ASC finishes processing, then one deliver call
  # pushes fastlane/metadata (What's New + review notes), attaches the build to the version (creating the
  # version record when absent), and — unless submit_for_review=false — submits it for App Review.
  submit:
    needs: ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - run: gem install fastlane --no-document

      - name: Stage App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.APPSTORE_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          echo "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          jq -n --arg key_id "$ASC_KEY_ID" --arg issuer_id "$ASC_ISSUER_ID" \
                --rawfile key "$RUNNER_TEMP/AuthKey.p8" \
                '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
                > "$RUNNER_TEMP/asc_api_key.json"

      - name: Wait for ASC build processing (BUILD ${{ github.run_number }})
        # No public push/callback fits a one-shot CI run, so this is the industry-standard poll: the
        # builds resource's processingState flips PROCESSING → VALID (or FAILED/INVALID). 60s cadence,
        # 45min ceiling — beyond that something is genuinely wrong with the upload.
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          cat > "$RUNNER_TEMP/wait_processing.rb" <<'RUBY'
          require "spaceship"
          token = Spaceship::ConnectAPI::Token.create(
            key_id: ENV.fetch("ASC_KEY_ID"), issuer_id: ENV.fetch("ASC_ISSUER_ID"),
            filepath: File.join(ENV.fetch("RUNNER_TEMP"), "AuthKey.p8"),
          )
          Spaceship::ConnectAPI.token = token
          app = Spaceship::ConnectAPI::App.find("com.panda.ccpocket") or abort("app not found in ASC")
          deadline = Time.now + 45 * 60
          loop do
            build = app.get_builds(filter: { version: ENV.fetch("BUILD_NUMBER") }, sort: "-uploadedDate").first
            state = build&.processing_state
            puts "#{Time.now.strftime('%H:%M:%S')} build #{ENV['BUILD_NUMBER']}: #{state || 'not visible yet'}"
            break if state == "VALID"
            abort("build ended in #{state} — fix the upload before submitting") if %w[FAILED INVALID].include?(state.to_s)
            abort("timed out after 45min of processing") if Time.now > deadline
            sleep 60
          end
          RUBY
          ruby "$RUNNER_TEMP/wait_processing.rb"

      - name: Deliver — metadata + attach build ${{ github.run_number }}${{ inputs.submit_for_review && ' + submit for review' || '' }}
        # One deliver call does it all: syncs release_notes/review notes from fastlane/metadata, creates
        # the ASC version when absent, pins THIS run's build to it, and (input-gated) submits. The
        # questionnaire answers live in fastlane/Deliverfile (submission_information). If this fails,
        # the binary is already uploaded & processed — rerun just this job, or finish by hand in ASC.
        env:
          MARKETING_VERSION: ${{ needs.ios.outputs.version }} # the RESOLVED version (repo lockstep unless overridden), never the raw input
          BUILD_NUMBER: ${{ github.run_number }}
          SUBMIT: ${{ inputs.submit_for_review }}
          AUTO_RELEASE: ${{ inputs.automatic_release }}
        run: |
          fastlane deliver --api_key_path "$RUNNER_TEMP/asc_api_key.json" \
            --app_version "$MARKETING_VERSION" \
            --build_number "$BUILD_NUMBER" \
            --submit_for_review "$SUBMIT" \
            --automatic_release "$AUTO_RELEASE"

  # TestFlight public link (external Beta App Review), folded into the release so it no longer needs a
  # separate testflight-public-link.yml dispatch. Runs after `submit` (which polls the build to VALID), so
  # the build is processed by the time the reused workflow looks for it. The public-link group is reused, so
  # the shared link (testflight.apple.com/join/…) never changes. Skip with distribute_testflight=false.
  testflight:
    if: ${{ inputs.distribute_testflight }}
    needs: [ios, submit]
    uses: ./.github/workflows/testflight-public-link.yml
    with:
      version: ${{ needs.ios.outputs.version }}
    secrets: inherit
