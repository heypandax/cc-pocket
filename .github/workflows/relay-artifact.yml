name: relay-artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Relay package version
        required: true
        default: 1.3.25

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # The mobile module is configured with the repository even though this workflow only builds
      # relay, so keep the same minimal Android setup used by CI and the daemon artifact workflow.
      - uses: android-actions/setup-android@v3

      - name: Add placeholder Firebase config
        run: cp mobile/composeApp/google-services.json.template mobile/composeApp/google-services.json

      - name: Build Linux relay package
        run: bash scripts/release-relay-linux.sh "${{ inputs.version }}"

      - name: Write checksum manifest
        run: sha256sum "cc-pocket-relay-${{ inputs.version }}-linux-x86_64.tar.gz" > SHA256SUMS

      - uses: actions/upload-artifact@v6
        with:
          name: cc-pocket-relay-${{ inputs.version }}
          path: |
            cc-pocket-relay-${{ inputs.version }}-linux-x86_64.tar.gz
            SHA256SUMS
          retention-days: 30
