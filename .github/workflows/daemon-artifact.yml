name: daemon-artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Daemon version
        required: true
        default: 1.3.22

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Add placeholder Firebase config
        run: cp mobile/composeApp/google-services.json.template mobile/composeApp/google-services.json
      - name: Build daemon distribution
        run: ./gradlew :daemon:installDist -PappVersion=${{ inputs.version }} --no-daemon
      - name: Package daemon
        run: tar -C daemon/build/install -czf cc-pocket-daemon-${{ inputs.version }}.tar.gz cc-pocket-daemon
      - uses: actions/upload-artifact@v6
        with:
          name: cc-pocket-daemon-${{ inputs.version }}
          path: cc-pocket-daemon-${{ inputs.version }}.tar.gz
          retention-days: 7
