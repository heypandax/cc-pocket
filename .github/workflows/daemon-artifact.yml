name: daemon-artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: Daemon version
        required: true
        default: 1.3.24

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Add placeholder Firebase config
        run: cp mobile/composeApp/google-services.json.template mobile/composeApp/google-services.json
      - name: Build self-contained Linux daemon (bundled JRE)
        run: bash scripts/release-linux.sh "${{ inputs.version }}"
      - name: Write checksum manifest
        run: sha256sum "cc-pocket-daemon-${{ inputs.version }}-linux-x86_64.tar.gz" > SHA256SUMS
      - uses: actions/upload-artifact@v6
        with:
          name: cc-pocket-daemon-${{ inputs.version }}
          path: |
            cc-pocket-daemon-${{ inputs.version }}-linux-x86_64.tar.gz
            SHA256SUMS
          retention-days: 7
