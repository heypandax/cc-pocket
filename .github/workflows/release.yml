name: release

# Builds the self-contained cc-pocket daemon (bundled JRE via jpackage) for every desktop
# platform — plus the signed Android phone APK — and attaches the artifacts to a GitHub release.
# jpackage CAN'T cross-compile — it
# bundles the host JRE — so each OS/arch is built on a matching runner:
#   macOS arm64   -> macos-14, native arm64 JDK              [signed + notarized]
#   macOS x86_64  -> macos-14, x86_64 JDK under Rosetta      [signed + notarized]
#   Windows x86_64-> windows-latest
#   Linux  x86_64 -> ubuntu-latest
# Both macOS arches build on Apple Silicon (macos-14): jpackage bundles whichever JDK arch it's
# given, so an x86_64 JDK (run via Rosetta) emits an x86_64 image. We deliberately AVOID the
# macos-13 Intel runner — GitHub is retiring it and jobs there queue indefinitely. The Mac dev box
# can't produce the Intel / Windows / Linux artifacts locally, which is why this all runs in CI.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, no leading v (e.g. 1.3.0). The release tag must be v<version>."
        required: true
      only_android:
        description: "Only build & attach the Android APK (skip daemon jobs). For testing the APK pipeline against an existing release WITHOUT re-uploading daemon tarballs (which would change their sha256 and break the published Homebrew cask)."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  macos:
    if: ${{ !inputs.only_android }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            jdk_arch: aarch64   # native on the Apple Silicon runner
          - arch: x86_64
            jdk_arch: x64       # cross-build via Rosetta
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Rosetta (for the x86_64 JDK)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk_arch }}, with jpackage)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          architecture: ${{ matrix.jdk_arch }}

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Import the Developer ID Application cert into a throwaway keychain so codesign can find
          # it. The keychain is unlocked and added to the search list for this runner only.
          KEYCHAIN="$RUNNER_TEMP/ccp-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # allow codesign to use the key without an interactive prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, tarball
        env:
          CCP_ARCH: ${{ matrix.arch }}
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/release-macos.sh gradlew
          scripts/release-macos.sh "${{ inputs.version }}"

      - name: Upload tarball to release v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT="cc-pocket-daemon-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz"
          echo "sha256: $(shasum -a 256 "$ARTIFACT" | awk '{print $1}')"
          gh release upload "v${{ inputs.version }}" "$ARTIFACT" --clobber

  windows:
    if: ${{ !inputs.only_android }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17 (with jpackage)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build self-contained Windows zip
        run: pwsh scripts/release-windows.ps1 "${{ inputs.version }}"

      - name: Upload zip to release v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifact = "cc-pocket-daemon-${{ inputs.version }}-windows-x86_64.zip"
          $sha = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLower()
          Write-Host "sha256: $sha"
          gh release upload "v${{ inputs.version }}" $artifact --clobber

  linux:
    if: ${{ !inputs.only_android }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        # jpackage bundles the HOST JRE (no cross-build), so each arch needs a native runner.
        # ubuntu-24.04-arm is GitHub's free arm64 runner for public repos (issue #34).
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17 (with jpackage)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Build self-contained Linux tarball
        run: |
          chmod +x scripts/release-linux.sh gradlew
          scripts/release-linux.sh "${{ inputs.version }}"

      - name: Upload tarball to release v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT="cc-pocket-daemon-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz"
          echo "sha256: $(sha256sum "$ARTIFACT" | awk '{print $1}')"
          gh release upload "v${{ inputs.version }}" "$ARTIFACT" --clobber

  android:
    # Builds the signed phone app (:mobile:composeApp) and attaches the APK to the release, so the
    # website's "newest .apk" link always resolves to a current, release-signed build. The signing
    # key is injected from repo secrets; if any are missing the build.gradle signing config is
    # skipped and we FAIL the job rather than ship an unsigned APK (apksigner verify is the gate).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CCPOCKET_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::CCPOCKET_KEYSTORE_BASE64 secret is not set — cannot produce a signed APK."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cc-pocket-release.jks"

      - name: Restore google-services.json
        # Gitignored (not committed), but the Firebase google-services plugin needs it at build
        # time. It ships inside the APK anyway, so it's kept as a secret only to honor the repo's
        # gitignore convention — not because it's sensitive.
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set — the Firebase plugin can't build without it."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > mobile/composeApp/google-services.json

      - name: Build signed release APK
        env:
          # build.gradle.kts reads these via providers.gradleProperty(...). Gradle maps each
          # ORG_GRADLE_PROJECT_<name> env var to a project property, so the keystore path and
          # passwords stay out of the command line, the repo, and the build logs.
          ORG_GRADLE_PROJECT_CCPOCKET_KEYSTORE: ${{ runner.temp }}/cc-pocket-release.jks
          ORG_GRADLE_PROJECT_CCPOCKET_KEYSTORE_PASSWORD: ${{ secrets.CCPOCKET_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_CCPOCKET_KEY_ALIAS: ${{ secrets.CCPOCKET_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_CCPOCKET_KEY_PASSWORD: ${{ secrets.CCPOCKET_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          # The repo's gradle.properties pins org.gradle.java.home to the Mac dev box's Homebrew
          # JDK, which doesn't exist on Linux — override it with the runner's JDK (same trick the
          # daemon release scripts use).
          ./gradlew :mobile:composeApp:assembleRelease -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Verify signature & upload APK to release v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SRC=$(ls mobile/composeApp/build/outputs/apk/release/*-release.apk 2>/dev/null | grep -v unsigned | head -1)
          if [ -z "$SRC" ]; then echo "::error::no release APK produced"; exit 1; fi
          # Gate: a missing/incorrect signing config yields an unsigned APK — apksigner verify
          # exits non-zero on that, failing the job before we publish a non-installable build.
          APKSIGNER=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs "$SRC"
          VN=$(grep -E '^[[:space:]]*versionName' mobile/composeApp/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "app versionName: $VN"
          # Stable, version-less name so https://github.com/.../releases/latest/download/cc-pocket-android.apk
          # is a permanent "always newest" link the README and site can hard-code (the per-release
          # tag still carries the version; the APK's own versionName shows in Android settings).
          ARTIFACT="cc-pocket-android.apk"
          cp "$SRC" "$ARTIFACT"
          echo "sha256: $(sha256sum "$ARTIFACT" | awk '{print $1}')"
          gh release upload "v${{ inputs.version }}" "$ARTIFACT" --clobber

  macos-desktop:
    # The Compose Desktop APP (.dmg) for macOS — signed + notarized, attached to the release under a stable
    # version-less name (so releases/latest/download/cc-pocket-desktop-macos-<arch>.dmg is a permanent link).
    # BOTH arches build on Apple Silicon (macos-14): an x86_64 Temurin JDK under Rosetta makes packageDmg
    # bundle the x64 Skiko + JRE, so Intel Macs get a native dmg (issue #68). Same trick as the daemon `macos`
    # job; we AVOID the retiring macos-13 Intel runner (jobs there queue indefinitely).
    # composeApp applies the Android + googleServices plugins, so the build needs the Android SDK at configure
    # time and a google-services.json to exist — the desktop target never touches Firebase, so a placeholder is fine.
    if: ${{ !inputs.only_android }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            jdk_arch: aarch64   # native on the Apple Silicon runner
          - arch: x86_64
            jdk_arch: x64       # cross-build via Rosetta
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install Rosetta (for the x86_64 JDK)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk_arch }}, with jpackage)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          architecture: ${{ matrix.jdk_arch }}

      - name: Set up Android SDK (composeApp applies the Android plugin — needed at configuration time)
        uses: android-actions/setup-android@v3

      - name: Write placeholder google-services.json (gitignored; desktop target never uses Firebase)
        run: |
          cat > mobile/composeApp/google-services.json <<'JSON'
          {
            "project_info": { "project_number": "000000000000", "project_id": "ccpocket-ci-placeholder" },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.panda.ccpocket" }
                },
                "api_key": [ { "current_key": "AIzaPlaceholderKeyForCiDesktopBuildOnly0000" } ],
                "oauth_client": [],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/ccp-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build + sign + notarize the DMG
        env:
          CCP_ARCH: ${{ matrix.arch }}   # names the dmg for the JDK's arch (uname -m still says arm64 under Rosetta)
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/release-desktop-macos.sh gradlew
          scripts/release-desktop-macos.sh "${{ inputs.version }}"

      - name: Upload DMG to release v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ inputs.version }}"
          ARCH="${{ matrix.arch }}"
          VERSIONED="cc-pocket-desktop-${VER}-macos-${ARCH}.dmg"
          # per-arch version-less permalink: releases/latest/download/cc-pocket-desktop-macos-{arm64,x86_64}.dmg
          cp "$VERSIONED" "cc-pocket-desktop-macos-${ARCH}.dmg"
          gh release upload "v${VER}" "$VERSIONED" "cc-pocket-desktop-macos-${ARCH}.dmg" --clobber

  windows-desktop:
    # The Compose Desktop APP (.msi installer) for Windows, attached to the release under a stable version-less
    # name. jpackage can't cross-compile, so this runs on windows-latest (which ships WiX, so the MSI builds).
    # Mirrors build-windows.yml's windows-app job but uploads to the release instead of a workflow artifact.
    if: ${{ !inputs.only_android }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17 (with jpackage)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (composeApp applies the Android plugin — needed at configuration time)
        uses: android-actions/setup-android@v3

      - name: Write placeholder google-services.json (gitignored; desktop target never uses Firebase)
        shell: bash
        run: |
          cat > mobile/composeApp/google-services.json <<'JSON'
          {
            "project_info": { "project_number": "000000000000", "project_id": "ccpocket-ci-placeholder" },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.panda.ccpocket" }
                },
                "api_key": [ { "current_key": "AIzaPlaceholderKeyForCiDesktopBuildOnly0000" } ],
                "oauth_client": [],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Unpin the macOS-only JDK path (gradle.properties pins it for local dev; CI uses the runner JDK)
        shell: bash
        run: grep -v 'org.gradle.java.home' gradle.properties > gradle.properties.tmp && mv gradle.properties.tmp gradle.properties

      - name: Build desktop app — MSI installer
        shell: bash
        run: |
          # retry createDistributable — Maven Central / the plugins portal occasionally 403s or times out from CI
          ok=0
          for attempt in 1 2 3; do
            if ./gradlew :mobile:composeApp:createDistributable --no-daemon --stacktrace; then ok=1; break; fi
            echo "::warning::createDistributable attempt $attempt failed (network?), retrying in 20s"; sleep 20
          done
          [ "$ok" = 1 ] || { echo "::error::createDistributable failed after 3 attempts"; exit 1; }
          ./gradlew :mobile:composeApp:packageMsi --no-daemon

      - name: Upload MSI to release v${{ inputs.version }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MSI=$(find mobile/composeApp/build/compose/binaries -name "*.msi" | head -1)
          [ -n "$MSI" ] || { echo "::error::no MSI produced (WiX missing?)"; exit 1; }
          cp "$MSI" cc-pocket-desktop-windows-x86_64.msi
          gh release upload "v${{ inputs.version }}" cc-pocket-desktop-windows-x86_64.msi --clobber

  # Keep the Scoop bucket (heypandax/scoop-bucket) on the release we just published: without this the
  # manifest stays pinned to an old version forever (its checkver/autoupdate fields are inert — no
  # excavator runs on a personal bucket), which stranded every Windows user on 1.1.9 (issue #25).
  # Needs a repo secret SCOOP_BUCKET_TOKEN: a fine-grained PAT with contents:write on
  # heypandax/scoop-bucket. Skips gracefully (with a warning) when the secret is absent.
  bump-scoop:
    if: ${{ !inputs.only_android }}
    needs: [windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update scoop manifest to v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          if [ -z "$BUCKET_TOKEN" ]; then
            echo "::warning::SCOOP_BUCKET_TOKEN not set — scoop bucket NOT bumped. Update heypandax/scoop-bucket by hand (bucket/cc-pocket-daemon.json: version/url/hash)."
            exit 0
          fi
          VER="${{ inputs.version }}"
          ZIP="cc-pocket-daemon-$VER-windows-x86_64.zip"
          gh release download "v$VER" --pattern "$ZIP" --repo "${{ github.repository }}"
          SHA=$(sha256sum "$ZIP" | awk '{print $1}')
          # keep the repo's template manifest in lockstep, then push the same content to the bucket repo
          jq --arg v "$VER" --arg sha "$SHA" \
             '.version=$v
              | .architecture."64bit".url="https://github.com/heypandax/cc-pocket/releases/download/v\($v)/cc-pocket-daemon-\($v)-windows-x86_64.zip"
              | .architecture."64bit".hash=$sha' \
             packaging/scoop/cc-pocket-daemon.json > manifest.json
          CONTENT=$(base64 -w0 manifest.json)
          CUR_SHA=$(curl -fsS -H "Authorization: Bearer $BUCKET_TOKEN" \
            "https://api.github.com/repos/heypandax/scoop-bucket/contents/bucket/cc-pocket-daemon.json" | jq -r '.sha')
          curl -fsS -X PUT -H "Authorization: Bearer $BUCKET_TOKEN" \
            "https://api.github.com/repos/heypandax/scoop-bucket/contents/bucket/cc-pocket-daemon.json" \
            -d "$(jq -n --arg msg "cc-pocket-daemon $VER" --arg content "$CONTENT" --arg sha "$CUR_SHA" \
                  '{message:$msg, content:$content, sha:$sha}')" >/dev/null
          echo "scoop bucket bumped to $VER (sha256 $SHA)"

  # One SHA256SUMS over every release asset, for the installers' + self-updater's download verification
  # (the Claude Code pattern: manifest + per-platform checksum). Runs after all uploads so the sums
  # cover the final artifacts; --clobber makes re-runs safe.
  checksums:
    if: ${{ !inputs.only_android }}
    needs: [macos, windows, linux, android, macos-desktop, windows-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Generate + upload SHA256SUMS for v${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir assets && cd assets
          gh release download "v${{ inputs.version }}" --repo "${{ github.repository }}" --pattern '*'
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
          gh release upload "v${{ inputs.version }}" SHA256SUMS --clobber --repo "${{ github.repository }}"
          echo "──"; cat SHA256SUMS
