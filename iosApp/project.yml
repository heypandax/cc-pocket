name: iosApp
options:
  bundleIdPrefix: com.panda
  # Keep the generated project readable by Xcode 15.4. The TrollStore build deliberately uses the
  # iOS-17-era toolchain so its WidgetKit extension cannot link iOS 18+ SwiftUI runtime symbols.
  xcodeVersion: "15.4"
  deploymentTarget:
    iOS: "15.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    dependencies:
      - target: CCPocketUsageWidget
        embed: true
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    settings:
      base:
        # dev.ccpocket.app 被旧 Apple 账号占用（bundle ID 跨 team 全局唯一），换账号后改用此 ID
        PRODUCT_BUNDLE_IDENTIFIER: com.panda.ccpocket
        PRODUCT_NAME: cc-pocket
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SC9S2SJ42G  # 当前账号 team；写进来让 xcodegen generate 后不用重选
        INFOPLIST_FILE: iosApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        # iPhone only. Without this, xcodegen defaults to "1,2" (universal) and App Store validation
        # rejects the Portrait-only Info.plist for iPad multitasking. The committed .xcodeproj already
        # has TARGETED_DEVICE_FAMILY=1; declaring it here keeps the CI-regenerated project in sync.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../mobile/composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Xcode 的构建环境 PATH 里通常没有 java；显式指定，避免 gradlew 启动失败
          export JAVA_HOME="${JAVA_HOME:-/opt/homebrew/opt/openjdk@17}"
          cd "$SRCROOT/.."
          ./gradlew :mobile:composeApp:embedAndSignAppleFrameworkForXcode
  CCPocketUsageWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: CCPocketUsageWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panda.ccpocket.usage-widget
        PRODUCT_NAME: CCPocketUsageWidget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SC9S2SJ42G
        INFOPLIST_FILE: CCPocketUsageWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CCPocketUsageWidget/CCPocketUsageWidget.entitlements
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
