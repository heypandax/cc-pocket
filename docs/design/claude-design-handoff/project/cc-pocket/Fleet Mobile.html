<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Fleet · mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#08090A;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#ECEDEE;}
  @keyframes flPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.82);}}
  .fl-pulse{animation:flPulse 1.25s ease-in-out infinite;}
  @keyframes flGlow{0%,100%{opacity:.9;}50%{opacity:.35;}}
  .fl-glow{animation:flGlow 1.4s ease-in-out infinite;}
  @keyframes flBlink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  .fl-caret{display:inline-block;width:8px;height:15px;background:#D97757;border-radius:1.5px;vertical-align:text-bottom;transform:translateY(2px);animation:flBlink 1.05s steps(1) infinite;}
  .fl-scroll::-webkit-scrollbar{width:0;height:0;}
  .fl-scroll{scrollbar-width:none;}
  .fl-press{transition:background .12s ease;}
  .fl-press:active{background:#1E2125;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="fleet-mobile.jsx?v=1"></script>
</body>
</html>
